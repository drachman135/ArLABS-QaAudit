<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin Restoran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f4f7; }
  </style>
</head>
<body class="p-4 sm:p-8 max-w-5xl mx-auto space-y-6">

  <div class="bg-rose-950 text-white p-6 rounded-3xl shadow-md flex flex-col sm:flex-row justify-between items-center gap-4">
    <div class="text-center sm:text-left">
      <h1 id="txtHeaderRestoran" class="text-2xl font-black text-amber-400 tracking-tight">KONTROL ENGINE OPERASIONAL</h1>
      <p class="text-xs text-rose-200 mt-0.5">Manajemen Profil, Menu, & Status Jam Kerja Live</p>
    </div>
    <a href="index.html" target="_blank" class="bg-amber-400 text-rose-950 font-black px-4 py-2 rounded-xl text-xs uppercase tracking-wider hover:bg-amber-300 transition">🌐 Buka Menu Pembeli</a>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
    
    <div class="space-y-6 md:col-span-1">
      
      <div class="bg-white rounded-3xl shadow-sm border border-neutral-200/60 overflow-hidden">
        <button onclick="toggleDropdown('Profil')" class="w-full p-5 flex justify-between items-center bg-white hover:bg-neutral-50/80 transition text-left outline-none">
          <div>
            <h2 class="text-xs font-black text-neutral-800 uppercase tracking-widest">🏢 Profil & Pengumuman</h2>
            <p class="text-[10px] text-neutral-400 mt-0.5">Nama, WA, Alamat, Ticker, Pop-Up</p>
          </div>
          <span id="ikonPanahProfil" class="text-xs font-bold text-neutral-400 transition-transform duration-300">▼</span>
        </button>

        <div id="kontenDropdownProfil" class="hidden p-5 border-t border-neutral-100 bg-neutral-50/50 space-y-3">
          <div>
            <label class="text-[10px] font-bold text-neutral-400 uppercase">Nama Restoran <span class="text-[9px] text-neutral-400 font-normal">(Opsional)</span></label>
            <input type="text" id="profilNama" placeholder="Ubah nama ruko" class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          </div>
          <div>
            <label class="text-[10px] font-bold text-neutral-400 uppercase">Nomor WhatsApp Toko <span class="text-[9px] text-neutral-400 font-normal">(Opsional)</span></label>
            <input type="text" id="profilWA" placeholder="Contoh: 6281234567890" class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          </div>
          <div>
            <label class="text-[10px] font-bold text-neutral-400 uppercase">Alamat Operasional <span class="text-[9px] text-neutral-400 font-normal">(Opsional)</span></label>
            <textarea id="profilAlamat" rows="2" placeholder="Ubah alamat ruko" class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950"></textarea>
          </div>
          
          <div class="pt-2 border-t border-neutral-200 space-y-1">
            <div class="flex justify-between items-center">
              <label class="text-[10px] font-bold text-orange-600 uppercase">📢 Teks Berjalan Customer</label>
              <button onclick="hapusElemenPengumuman('tickerText')" class="text-[9px] font-black text-red-600 hover:underline">Hapus Teks Berjalan 🗑️</button>
            </div>
            <input type="text" id="profilTickerText" placeholder="Tulis pengumuman berjalan baru..." class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          </div>

          <div class="space-y-1">
            <div class="flex justify-between items-center">
              <label class="text-[10px] font-bold text-red-600 uppercase">🚨 Pop-Up Tengah Halaman</label>
              <button onclick="hapusElemenPengumuman('popupText')" class="text-[9px] font-black text-red-600 hover:underline">Hapus Pop-Up 🗑️</button>
            </div>
            <textarea id="profilPopupText" rows="2" placeholder="Tulis teks pengumuman tengah layar baru..." class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950"></textarea>
          </div>

          <button onclick="simpanProfilRestoran()" class="w-full bg-neutral-900 text-white text-xs font-black py-2 rounded-xl uppercase tracking-wider hover:bg-neutral-800 transition">Simpan Perubahan 💾</button>
        </div>
      </div>

      <div class="bg-white rounded-3xl shadow-sm border border-neutral-200/60 overflow-hidden">
        <button onclick="toggleDropdown('Jam')" class="w-full p-5 flex justify-between items-center bg-white hover:bg-neutral-50/80 transition text-left outline-none">
          <div>
            <h2 class="text-xs font-black text-neutral-800 uppercase tracking-widest">⏰ Jam Operasional Live</h2>
            <p class="text-[10px] text-neutral-400 mt-0.5">Atur jam buka otomatis / saklar darurat</p>
          </div>
          <span id="ikonPanahJam" class="text-xs font-bold text-neutral-400 transition-transform duration-300">▼</span>
        </button>

        <div id="kontenDropdownJam" class="hidden p-5 border-t border-neutral-100 bg-neutral-50/50 space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[10px] font-bold text-neutral-400 uppercase">Jam Buka (WIB)</label>
              <input type="number" id="inputJamBuka" min="0" max="23" class="w-full p-2.5 bg-white border rounded-xl text-xs font-bold outline-none focus:border-rose-950">
            </div>
            <div>
              <label class="text-[10px] font-bold text-neutral-400 uppercase">Jam Tutup (WIB)</label>
              <input type="number" id="inputJamTutup" min="0" max="23" class="w-full p-2.5 bg-white border rounded-xl text-xs font-bold outline-none focus:border-rose-950">
            </div>
          </div>
          <button onclick="simpanJamOperasional()" class="w-full bg-rose-950 text-amber-400 text-xs font-black py-2.5 rounded-xl uppercase tracking-wider shadow-sm hover:bg-rose-900 transition">Simpan Jam 💾</button>
          
          <div class="pt-2 border-t border-neutral-200">
            <label class="text-[10px] font-bold text-neutral-400 uppercase block mb-1">Status Darurat Toko</label>
            <button id="btnTutupDarurat" onclick="toggleTutupDarurat()" class="w-full text-xs font-black py-3 rounded-xl uppercase tracking-wider shadow-sm transition"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-neutral-200/60 md:col-span-2 overflow-hidden">
      <button onclick="toggleDropdown('Menu')" class="w-full p-5 flex justify-between items-center bg-white hover:bg-neutral-50/80 transition text-left outline-none">
        <div>
          <h2 class="text-xs font-black text-neutral-800 uppercase tracking-widest">🍲 Manajemen Tambah Menu Baru</h2>
          <p class="text-[10px] text-neutral-400 mt-0.5">Buka form input data katalog kuliner</p>
        </div>
        <span id="ikonPanahMenu" class="text-xs font-bold text-neutral-400 transition-transform duration-300">▼</span>
      </button>

      <div id="kontenDropdownMenu" class="hidden p-5 border-t border-neutral-100 bg-neutral-50/50 space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="text-[10px] font-bold text-neutral-400 uppercase">Nama Menu</label>
            <input type="text" id="menuNama" placeholder="Contoh: Seblak Tulangan Premium" class="w-full p-2.5 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          </div>
          <div>
            <label class="text-[10px] font-bold text-neutral-400 uppercase">Kategori</label>
            <select id="menuKategori" class="w-full p-2.5 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
              <option value="makanan">🍲 Makanan</option>
              <option value="minuman">🍹 Minuman</option>
              <option value="cemilan">🍿 Cemilan</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-bold text-neutral-400 uppercase">Harga Normal (Rp)</label>
            <input type="number" id="menuHarga" placeholder="15000" class="w-full p-2.5 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          </div>
          <div>
            <label class="text-[10px] font-bold text-neutral-400 uppercase">Harga Promo (Rp) - Opsional</label>
            <input type="number" id="menuHargaPromo" placeholder="Kosongkan jika tidak promo" class="w-full p-2.5 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          </div>
          <div class="sm:col-span-2">
            <label class="text-[10px] font-bold text-neutral-400 uppercase block">Foto Menu</label>
            <input type="file" id="menuFotoFile" accept="image/*" onchange="prosesDanKompresGambar(this)" class="w-full text-xs text-neutral-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-rose-50 file:text-rose-950 hover:file:bg-rose-100 cursor-pointer mt-1">
            <p id="statusKompresi" class="text-[10px] text-emerald-600 font-bold mt-1 hidden">✓ Gambar berhasil dikompres otomatis di bawah 150 KB!</p>
          </div>
        </div>
        <button onclick="unggahMenuBaru()" class="w-full bg-emerald-600 text-white text-xs font-black py-3 rounded-xl uppercase tracking-wider shadow-md hover:bg-emerald-700 transition">Publish Menu Ke Firebase Live 🚀</button>
      </div>
    </div>
  </div>

  <div class="bg-white p-5 rounded-3xl shadow-sm border border-neutral-200/60 space-y-4">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b pb-2 gap-3">
      <h2 class="text-xs font-black text-neutral-800 uppercase tracking-widest">📋 Semua Katalog Live di Database</h2>
      <div class="flex bg-neutral-100 p-1 rounded-xl gap-1 border">
        <button onclick="setFilterTabelAdmin('semua')" id="tabTabel-semua" class="tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black bg-white text-neutral-800 shadow-sm transition">Semua</button>
        <button onclick="setFilterTabelAdmin('makanan')" id="tabTabel-makanan" class="tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black text-neutral-500 hover:text-neutral-800 transition">🍲 Makanan</button>
        <button onclick="setFilterTabelAdmin('minuman')" id="tabTabel-minuman" class="tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black text-neutral-500 hover:text-neutral-800 transition">🍹 Minuman</button>
        <button onclick="setFilterTabelAdmin('cemilan')" id="tabTabel-cemilan" class="tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black text-neutral-500 hover:text-neutral-800 transition">🍿 Cemilan</button>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-xs border-collapse">
        <thead>
          <tr class="border-b text-neutral-400 uppercase text-[10px] font-black tracking-wider">
            <th class="py-3 px-2">Foto</th>
            <th class="py-3 px-2">Nama Menu</th>
            <th class="py-3 px-2">Kategori</th>
            <th class="py-3 px-2">Harga Final (Rp)</th>
            <th class="py-3 px-2 text-center">Stok</th>
            <th class="py-3 px-2 text-center">Aksi</th>
          </tr>
        </thead>
        <tbody id="tbodyMenuLive" class="divide-y font-medium text-neutral-700"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc, addDoc, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlZTatONukCKARuviwEUCiDUMuT03nz3U",
      authDomain: "warungmuchsinassegaf.firebaseapp.com",
      projectId: "warungmuchsinassegaf",
      storageBucket: "warungmuchsinassegaf.firebasestorage.app",
      messagingSenderId: "32676861503",
      appId: "1:32676861503:web:e35868f9daf6940dbe8a8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentTutupDarurat = false;
    let base64GambarResized = "";
    let semuaMenuAdminData = [];
    let filterTabelAktif = "semua";

    window.toggleDropdown = (namaPanel) => {
      const konten = document.getElementById(`kontenDropdown${namaPanel}`);
      const ikon = document.getElementById(`ikonPanah${namaPanel}`);
      if (konten.classList.contains("hidden")) {
        konten.classList.remove("hidden");
        ikon.innerText = "▲";
      } else {
        konten.classList.add("hidden");
        ikon.innerText = "▼";
      }
    };

    onSnapshot(doc(db, "pengaturan", "profil"), (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        if(data.nama) {
          document.getElementById("profilNama").placeholder = data.nama;
          document.getElementById("txtHeaderRestoran").innerText = `PANEL KENDALI: ${data.nama.toUpperCase()}`;
        }
        if(data.whatsapp) document.getElementById("profilWA").placeholder = data.whatsapp;
        if(data.alamat) document.getElementById("profilAlamat").placeholder = data.alamat;
        
        // Atur isi placeholder input pengumuman
        document.getElementById("profilTickerText").placeholder = data.tickerText || "Belum ada teks berjalan aktif.";
        document.getElementById("profilPopupText").placeholder = data.popupText || "Belum ada pengumuman pop-up aktif.";
      }
    });

    onSnapshot(doc(db, "pengaturan", "operasional"), (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById("inputJamBuka").value = data.jamBuka ?? 10;
        document.getElementById("inputJamTutup").value = data.jamTutup ?? 21;
        currentTutupDarurat = data.tutupDarurat === true;
        
        const btn = document.getElementById("btnTutupDarurat");
        if (currentTutupDarurat) {
          btn.className = "w-full bg-emerald-600 text-white text-xs font-black py-3 rounded-xl uppercase tracking-wider shadow-sm hover:bg-emerald-700 transition";
          btn.innerText = "🔓 Buka Warung Kembali";
        } else {
          btn.className = "w-full bg-red-600 text-white text-xs font-black py-3 rounded-xl uppercase tracking-wider shadow-sm hover:bg-red-700 transition";
          btn.innerText = "🚨 TUTUP DARURAT SEKARANG";
        }
      }
    });

    window.simpanProfilRestoran = async () => {
      const namaInput = document.getElementById("profilNama").value.trim();
      const whatsappInput = document.getElementById("profilWA").value.trim();
      const alamatInput = document.getElementById("profilAlamat").value.trim();
      const tickerInput = document.getElementById("profilTickerText").value.trim();
      const popupInput = document.getElementById("profilPopupText").value.trim();

      const dataUpdate = {};
      if (namaInput !== "") dataUpdate.nama = namaInput;
      if (whatsappInput !== "") dataUpdate.whatsapp = whatsappInput;
      if (alamatInput !== "") dataUpdate.alamat = alamatInput;
      if (tickerInput !== "") dataUpdate.tickerText = tickerInput;
      if (popupInput !== "") dataUpdate.popupText = popupInput;

      if (Object.keys(dataUpdate).length === 0) {
        alert("Silakan isi minimal salah satu kolom untuk melakukan perubahan data.");
        return;
      }

      try {
        const docRef = doc(db, "pengaturan", "profil");
        const docSnap = await getDoc(docRef);
        if (!docSnap.exists()) {
          await setDoc(docRef, dataUpdate);
        } else {
          await updateDoc(docRef, dataUpdate);
        }
        alert("Perubahan data berhasil disimpan secara live!");
        document.getElementById("profilNama").value = "";
        document.getElementById("profilWA").value = "";
        document.getElementById("profilAlamat").value = "";
        document.getElementById("profilTickerText").value = "";
        document.getElementById("profilPopupText").value = "";
      } catch (err) { alert("Gagal update profil: " + err.message); }
    };

    // REVISI FITUR: FUNGSI TOMBOL INSTAN UNTUK MENGHAPUS TICKER / POP-UP DARI DATABASE
    window.hapusElemenPengumuman = async (fieldNama) => {
      if (confirm(`Apakah Anda yakin ingin menonaktifkan dan menghapus data ${fieldNama === 'tickerText' ? 'Teks Berjalan' : 'Pop-Up'} ini?`)) {
        try {
          const docRef = doc(db, "pengaturan", "profil");
          const updateObject = {};
          updateObject[fieldNama] = ""; // Mengosongkan string di Firestore
          
          await updateDoc(docRef, updateObject);
          alert(`Sukses! ${fieldNama === 'tickerText' ? 'Teks Berjalan' : 'Pop-Up'} telah dinonaktifkan.`);
        } catch (err) {
          alert("Gagal menghapus elemen pengumuman: " + err.message);
        }
      }
    };

    window.simpanJamOperasional = async () => {
      const buka = parseInt(document.getElementById("inputJamBuka").value);
      const tutup = parseInt(document.getElementById("inputJamTutup").value);
      try {
        await setDoc(doc(db, "pengaturan", "operasional"), { jamBuka: buka, jamTutup: tutup, tutupDarurat: currentTutupDarurat }, { merge: true });
        alert("Jam operasional berhasil diperbarui!");
      } catch (err) { alert("Gagal menyimpan jam: " + err); }
    };

    window.toggleTutupDarurat = async () => {
      try {
        await setDoc(doc(db, "pengaturan", "operasional"), { tutupDarurat: !currentTutupDarurat }, { merge: true });
      } catch (err) { alert("Gagal merubah status: " + err); }
    };

    window.prosesDanKompresGambar = (inputElement) => {
      const file = inputElement.files[0];
      if (!file) return;
      document.getElementById("statusKompresi").classList.add("hidden");
      base64GambarResized = "";

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const MAX_WIDTH = 400;
          let width = img.width;
          let height = img.height;

          if (width > MAX_WIDTH) {
            height = Math.round((height * MAX_WIDTH) / width);
            width = MAX_WIDTH;
          }
          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          base64GambarResized = canvas.toDataURL("image/jpeg", 0.7);
          document.getElementById("statusKompresi").classList.remove("hidden");
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    window.unggahMenuBaru = async () => {
      const nama = document.getElementById("menuNama").value.trim();
      const kategori = document.getElementById("menuKategori").value;
      const harga = parseInt(document.getElementById("menuHarga").value);
      const hargaPromo = parseInt(document.getElementById("menuHargaPromo").value) || null;

      if (!nama || !harga) { alert("Nama menu dan harga normal wajib diisi!"); return; }

      try {
        await addDoc(collection(db, "menu"), { nama, kategori, harga, hargaPromo, foto: base64GambarResized, tersedia: true });
        alert("Sukses mempublikasikan menu baru!");
        document.getElementById("menuNama").value = "";
        document.getElementById("menuHarga").value = "";
        document.getElementById("menuHargaPromo").value = "";
        document.getElementById("menuFotoFile").value = "";
        document.getElementById("statusKompresi").classList.add("hidden");
        base64GambarResized = "";
      } catch (err) { alert("Gagal menambahkan menu: " + err); }
    };

    window.setFilterTabelAdmin = (kat) => {
      filterTabelAktif = kat;
      document.querySelectorAll('.tab-tabel-btn').forEach(btn => {
        btn.className = "tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black text-neutral-500 hover:text-neutral-800 transition";
      });
      document.getElementById(`tabTabel-${kat}`).className = "tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black bg-white text-neutral-800 shadow-sm transition";
      renderTabelAdminLive();
    };

    function renderTabelAdminLive() {
      const tbody = document.getElementById("tbodyMenuLive");
      tbody.innerHTML = "";
      const filteredData = semuaMenuAdminData.filter(m => filterTabelAktif === "semua" || m.kategori === filterTabelAktif);

      if(filteredData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="py-4 text-center text-neutral-400">Tidak ada menu untuk kategori ini.</td></tr>`;
        return;
      }

      filteredData.forEach(m => {
        const isTersedia = m.tersedia !== false;
        tbody.innerHTML += `
          <tr class="border-b hover:bg-neutral-50/50 transition">
            <td class="py-3 px-2"><img src="${m.foto || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=60'}" class="w-10 h-10 object-cover rounded-xl bg-neutral-100"></td>
            <td class="py-3 px-2 font-bold text-neutral-800 capitalize" id="cellNama-${m.id}">${m.nama}</td>
            <td class="py-3 px-2 uppercase text-[10px] tracking-wider text-neutral-400 font-extrabold">${m.kategori}</td>
            <td class="py-3 px-2 font-bold text-rose-950" id="cellHarga-${m.id}">
              ${m.hargaPromo ? `Promo: Rp ${new Intl.NumberFormat("id-ID").format(m.hargaPromo)} <span class="text-[10px] text-neutral-400 line-through block font-normal">Normal: Rp ${new Intl.NumberFormat("id-ID").format(m.harga)}</span>` : `Rp ${new Intl.NumberFormat("id-ID").format(m.harga)}`}
            </td>
            <td class="py-3 px-2 text-center">
              <button onclick="toggleKetersediaanStok('${m.id}', ${isTersedia})" class="px-2.5 py-1 rounded-full text-[10px] font-black ${isTersedia ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'} shadow-sm transition">
                ${isTersedia ? '🟢 TERSEDIA' : '🔴 HABIS'}
              </button>
            </td>
            <td class="py-3 px-2 text-center">
              <div class="flex justify-center gap-1.5" id="cellAksi-${m.id}">
                <button onclick="aktifkanQuickEdit('${m.id}', '${m.nama}', ${m.harga}, ${m.hargaPromo || 0})" class="bg-white text-neutral-700 font-bold px-2 py-1 rounded-lg border text-[10px] hover:bg-neutral-50 transition">Edit ✏️</button>
                <button onclick="hapusMenuDokumen('${m.id}')" class="bg-rose-50 text-rose-700 font-bold px-2 py-1 rounded-lg text-[10px] border border-rose-200/50 hover:bg-rose-100 transition">Hapus</button>
              </div>
            </td>
          </tr>`;
      });
    }

    window.aktifkanQuickEdit = (id, namaLama, hargaLama, promoLama) => {
      document.getElementById(`cellNama-${id}`).innerHTML = `<input type="text" id="editNama-${id}" value="${namaLama}" class="p-1 border rounded bg-white text-xs font-semibold max-w-[150px] outline-none">`;
      document.getElementById(`cellHarga-${id}`).innerHTML = `
        <div class="space-y-1">
          <input type="number" id="editHarga-${id}" value="${hargaLama}" class="p-1 border rounded bg-white text-xs font-semibold max-w-[90px] block outline-none" title="Harga Normal">
          <input type="number" id="editPromo-${id}" value="${promoLama || ''}" placeholder="Promo (Opsional)" class="p-1 border rounded bg-white text-[11px] font-medium max-w-[90px] block outline-none">
        </div>`;
      document.getElementById(`cellAksi-${id}`).innerHTML = `
        <button onclick="simpanQuickEdit('${id}')" class="bg-emerald-600 text-white font-black px-2 py-1 rounded-lg text-[10px] shadow-sm hover:bg-emerald-700 transition">Save</button>
        <button onclick="renderTabelAdminLive()" class="bg-neutral-200 text-neutral-700 font-bold px-2 py-1 rounded-lg text-[10px] hover:bg-neutral-300 transition">Cancel</button>`;
    };

    window.simpanQuickEdit = async (id) => {
      const namaBaru = document.getElementById(`editNama-${id}`).value.trim();
      const hargaBaru = parseInt(document.getElementById(`editHarga-${id}`).value);
      const promoBaruInput = document.getElementById(`editPromo-${id}`).value;
      const promoBaru = promoBaruInput ? parseInt(promoBaruInput) : null;

      if (!namaBaru || !hargaBaru) { alert("Nama menu dan harga tidak boleh kosong!"); return; }

      try {
        await updateDoc(doc(db, "menu", id), { nama: namaBaru, harga: hargaBaru, hargaPromo: promoBaru });
        alert("Menu berhasil diperbarui secara instan!");
      } catch (err) { alert("Gagal update menu: " + err.message); }
    };

    window.toggleKetersediaanStok = async (id, statusSekarang) => {
      try { await updateDoc(doc(db, "menu", id), { tersedia: !statusSekarang }); } catch (err) { alert("Gagal update status: " + err); }
    };

    window.hapusMenuDokumen = async (id) => {
      if (confirm("Apakah Anda yakin ingin menghapus permanen menu ini?")) {
        try { await deleteDoc(doc(db, "menu", id)); } catch (err) { alert("Gagal menghapus: " + err); }
      }
    };
  </script>
</body>
</html>
