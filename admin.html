<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin Restoran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f4f7; }
    @media print {
      body * { visibility: hidden; }
      #areaCetakNotaQR, #areaCetakNotaQR * { visibility: visible; }
      #areaCetakNotaQR { position: absolute; left: 0; top: 0; width: 100%; text-align: center; }
    }
  </style>
</head>
<body class="p-4 sm:p-8 max-w-5xl mx-auto space-y-6">

  <div class="bg-rose-950 text-white p-6 rounded-3xl shadow-md flex flex-col sm:flex-row justify-between items-center gap-4">
    <div class="text-center sm:text-left">
      <h1 id="txtHeaderRestoran" class="text-2xl font-black text-amber-400 tracking-tight">KONTROL ENGINE OPERASIONAL</h1>
      <p class="text-xs text-rose-200 mt-0.5">Manajemen Profil, Menu, QR Web, Multi Pop-Up & Status Jam Kerja Live</p>
    </div>
    <a href="index.html" target="_blank" class="bg-amber-400 text-rose-950 font-black px-4 py-2 rounded-xl text-xs uppercase tracking-wider hover:bg-amber-300 transition">🌐 Buka Menu Pembeli</a>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
    
    <div class="space-y-6 md:col-span-1">
      
      <div class="bg-white rounded-3xl shadow-sm border border-neutral-200/60 overflow-hidden">
        <button onclick="toggleDropdown('Profil')" class="w-full p-5 flex justify-between items-center bg-white hover:bg-neutral-50/80 transition text-left outline-none">
          <div>
            <h2 class="text-xs font-black text-neutral-800 uppercase tracking-widest">🏢 Profil & Pengumuman</h2>
            <p class="text-[10px] text-neutral-400 mt-0.5">Nama, WA, Alamat, Ticker, Pop-Up</p>
          </div>
          <span id="ikonPanahProfil" class="text-xs font-bold text-neutral-400 transition-transform duration-300">▼</span>
        </button>
        <div id="kontenDropdownProfil" class="hidden p-5 border-t border-neutral-100 bg-neutral-50/50 space-y-3">
          <input type="text" id="profilNama" placeholder="Ubah nama ruko" class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          <input type="text" id="profilWA" placeholder="Contoh: 6281234567890" class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          <textarea id="profilAlamat" rows="2" placeholder="Ubah alamat ruko" class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950"></textarea>
          <input type="text" id="profilTickerText" placeholder="Tulis pengumuman berjalan baru..." class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          <textarea id="profilPopupText" rows="2" placeholder="Tulis teks pop-up baru..." class="w-full p-2 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950"></textarea>
          <button onclick="kirimPopupMenumpukBaru()" class="w-full bg-red-600 text-white text-[10px] font-black py-1.5 rounded-lg uppercase hover:bg-red-700">Kirim Pop-Up 🚀</button>
          <button onclick="simpanProfilRestoran()" class="w-full bg-neutral-900 text-white text-xs font-black py-2 rounded-xl uppercase hover:bg-neutral-800">Simpan Data 💾</button>
        </div>
      </div>

      <div class="bg-white rounded-3xl shadow-sm border border-neutral-200/60 overflow-hidden">
        <button onclick="toggleDropdown('Jam')" class="w-full p-5 flex justify-between items-center bg-white hover:bg-neutral-50/80 transition text-left outline-none">
          <div>
            <h2 class="text-xs font-black text-neutral-800 uppercase tracking-widest">⏰ Jam Operasional</h2>
            <p class="text-[10px] text-neutral-400 mt-0.5">Atur jam buka otomatis</p>
          </div>
          <span id="ikonPanahJam" class="text-xs font-bold text-neutral-400 transition-transform duration-300">▼</span>
        </button>
        <div id="kontenDropdownJam" class="hidden p-5 border-t border-neutral-100 bg-neutral-50/50 space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <input type="number" id="inputJamBuka" min="0" max="23" class="w-full p-2.5 bg-white border rounded-xl text-xs font-bold">
            <input type="number" id="inputJamTutup" min="0" max="23" class="w-full p-2.5 bg-white border rounded-xl text-xs font-bold">
          </div>
          <button onclick="simpanJamOperasional()" class="w-full bg-rose-950 text-amber-400 text-xs font-black py-2.5 rounded-xl uppercase hover:bg-rose-900">Simpan Jam 💾</button>
          <button id="btnTutupDarurat" onclick="toggleTutupDarurat()" class="w-full text-xs font-black py-3 rounded-xl uppercase shadow-sm transition"></button>
        </div>
      </div>

      <div class="bg-white rounded-3xl shadow-sm border border-neutral-200/60 overflow-hidden">
        <button onclick="toggleDropdown('QrCode')" class="w-full p-5 flex justify-between items-center bg-white hover:bg-neutral-50/80 transition text-left outline-none">
          <div>
            <h2 class="text-xs font-black text-neutral-800 uppercase tracking-widest">🖨️ QR Code Resmi</h2>
            <p class="text-[10px] text-neutral-400 mt-0.5">Cetak barcode alamat website</p>
          </div>
          <span id="ikonPanahQrCode" class="text-xs font-bold text-neutral-400 transition-transform duration-300">▼</span>
        </button>
        <div id="kontenDropdownQrCode" class="hidden p-5 border-t border-neutral-100 bg-neutral-50/50 space-y-4">
          <button onclick="buatQrCodeWebUtamaOtomatis()" class="w-full bg-neutral-900 hover:bg-neutral-800 text-white text-xs font-black py-3 rounded-xl uppercase transition">
            ⚡ Buat QR Code Web Resto
          </button>
          
          <div id="areaCetakNotaQR" class="p-4 bg-white rounded-2xl border border-neutral-200/60 flex flex-col items-center justify-center text-center select-none shadow-sm">
            <h3 id="labelNamaTokoQR" class="text-[10px] font-black text-rose-950 uppercase mb-2">WARUNG DIGITAL</h3>
            <div id="boxContainerGpsQR" class="bg-white p-2 flex items-center justify-center">
              <div id="qrcodeCanvasBox"></div>
            </div>
            <h4 id="labelNomorMejaQR" class="text-[9px] font-extrabold text-neutral-400 uppercase mt-2 tracking-widest">BELUM DI-GENERATE</h4>
            <button id="btnCetakQR" onclick="window.print()" class="mt-3 w-full bg-rose-950 text-amber-400 font-extrabold text-[10px] py-2 rounded-xl uppercase tracking-wider shadow-sm hover:bg-rose-900 transition hidden">🖨️ Cetak Brosur QR</button>
          </div>
        </div>
      </div>

    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-neutral-200/60 md:col-span-2 overflow-hidden h-fit">
      <button onclick="toggleDropdown('Menu')" class="w-full p-5 flex justify-between items-center bg-white hover:bg-neutral-50/80 transition text-left outline-none">
        <div>
          <h2 class="text-xs font-black text-neutral-800 uppercase tracking-widest">🍲 Tambah Menu Baru</h2>
          <p class="text-[10px] text-neutral-400 mt-0.5">Input data katalog kuliner</p>
        </div>
        <span id="ikonPanahMenu" class="text-xs font-bold text-neutral-400 transition-transform duration-300">▼</span>
      </button>
      <div id="kontenDropdownMenu" class="hidden p-5 border-t border-neutral-100 bg-neutral-50/50 space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <input type="text" id="menuNama" placeholder="Nama Menu" class="w-full p-2.5 bg-white border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
          <select id="menuKategori" class="w-full p-2.5 bg-white border rounded-xl text-xs font-semibold outline-none">
            <option value="makanan">🍲 Makanan</option>
            <option value="minuman">🍹 Minuman</option>
            <option value="cemilan">🍿 Cemilan</option>
          </select>
          <input type="number" id="menuHarga" placeholder="Harga Normal (Rp)" class="w-full p-2.5 bg-white border rounded-xl text-xs font-semibold">
          <input type="number" id="menuHargaPromo" placeholder="Harga Promo (Rp)" class="w-full p-2.5 bg-white border rounded-xl text-xs font-semibold">
          <div class="sm:col-span-2">
            <input type="file" id="menuFotoFile" accept="image/*" onchange="prosesDanKompresGambar(this, 'tambah')" class="w-full text-xs text-neutral-500 cursor-pointer">
            <p id="statusKompresi" class="text-[10px] text-emerald-600 font-bold mt-1 hidden">✓ Foto siap!</p>
          </div>
        </div>
        <button onclick="unggahMenuBaru()" class="w-full bg-emerald-600 text-white text-xs font-black py-3 rounded-xl uppercase hover:bg-emerald-700">Publish Menu 🚀</button>
      </div>
    </div>
  </div>

  <div class="bg-white p-5 rounded-3xl shadow-sm border border-neutral-200/60 space-y-4">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b pb-2 gap-3">
      <h2 class="text-xs font-black text-neutral-800 uppercase tracking-widest">📋 Katalog Database Live</h2>
      <div class="flex bg-neutral-100 p-1 rounded-xl gap-1 border">
        <button onclick="setFilterTabelAdmin('semua')" id="tabTabel-semua" class="tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black bg-white text-neutral-800 shadow-sm transition">Semua</button>
        <button onclick="setFilterTabelAdmin('makanan')" id="tabTabel-makanan" class="tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black text-neutral-500 hover:text-neutral-800 transition">Makanan</button>
        <button onclick="setFilterTabelAdmin('minuman')" id="tabTabel-minuman" class="tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black text-neutral-500 hover:text-neutral-800 transition">Minuman</button>
        <button onclick="setFilterTabelAdmin('cemilan')" id="tabTabel-cemilan" class="tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black text-neutral-500 hover:text-neutral-800 transition">Cemilan</button>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-xs border-collapse">
        <thead>
          <tr class="border-b text-neutral-400 uppercase text-[10px] font-black tracking-wider">
            <th class="py-3 px-2">Foto</th>
            <th class="py-3 px-2">Nama Menu</th>
            <th class="py-3 px-2">Kategori</th>
            <th class="py-3 px-2">Harga (Rp)</th>
            <th class="py-3 px-2 text-center">Stok</th>
            <th class="py-3 px-2 text-center">Aksi</th>
          </tr>
        </thead>
        <tbody id="tbodyMenuLive" class="divide-y font-medium text-neutral-700"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, setDoc, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlZTatONukCKARuviwEUCiDUMuT03nz3U",
      authDomain: "warungmuchsinassegaf.firebaseapp.com",
      projectId: "warungmuchsinassegaf",
      storageBucket: "warungmuchsinassegaf.firebasestorage.app",
      messagingSenderId: "32676861503",
      appId: "1:32676861503:web:e35868f9daf6940dbe8a8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentTutupDarurat = false;
    let base64GambarResizedTambah = "";
    let tempEditGambar = {}; 
    let semuaMenuAdminData = [];
    let filterTabelAktif = "semua";

    window.toggleDropdown = (namaPanel) => {
      const konten = document.getElementById(`kontenDropdown${namaPanel}`);
      const ikon = document.getElementById(`ikonPanah${namaPanel}`);
      if(konten) konten.classList.toggle("hidden");
      if(ikon) ikon.innerText = konten.classList.contains("hidden") ? "▼" : "▲";
    };

    // LOGIKA AMBIL DATA PROFIL AWAL
    onSnapshot(doc(db, "pengaturan", "profil"), (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById("profilNama").value = data.nama || "";
        document.getElementById("profilWA").value = data.whatsapp || "";
        document.getElementById("profilAlamat").value = data.alamat || "";
        document.getElementById("profilTickerText").value = data.tickerText || "";
        document.getElementById("profilPopupText").value = data.popupText || "";
        document.getElementById("txtHeaderRestoran").innerText = (data.nama || "KONTROL ENGINE OPERASIONAL").toUpperCase();
        document.getElementById("labelNamaTokoQR").innerText = (data.nama || "WARUNG DIGITAL").toUpperCase();
      }
    });

    // LOGIKA GENERATE QR CODE WEB UTAMA
    window.buatQrCodeWebUtamaOtomatis = () => {
      const linkUtamaWebResto = "https://warungmuchsin.vercel.app/index.html";
      const boxCanvas = document.getElementById("qrcodeCanvasBox");
      boxCanvas.innerHTML = "";

      new QRCode(boxCanvas, {
        text: linkUtamaWebResto,
        width: 120,
        height: 120,
        colorDark: "#4c0519",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      document.getElementById("labelNomorMejaQR").innerText = "SCAN UNTUK PESAN ONLINE";
      document.getElementById("btnCetakQR").classList.remove("hidden");
    };

    // LOGIKA AMBIL DATA OPERASIONAL JAM LIVE
    onSnapshot(doc(db, "pengaturan", "operasional"), (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById("inputJamBuka").value = data.jamBuka ?? 10;
        document.getElementById("inputJamTutup").value = data.jamTutup ?? 21;
        currentTutupDarurat = data.tutupDarurat === true;
        const btn = document.getElementById("btnTutupDarurat");
        btn.innerText = currentTutupDarurat ? "🔓 Buka Warung" : "🚨 TUTUP DARURAT";
        btn.className = currentTutupDarurat ? "w-full bg-emerald-600 text-white text-xs font-black py-3 rounded-xl uppercase" : "w-full bg-red-600 text-white text-xs font-black py-3 rounded-xl uppercase";
      }
    });

    window.simpanProfilRestoran = async () => {
      const nama = document.getElementById("profilNama").value.trim();
      const whatsapp = document.getElementById("profilWA").value.trim();
      const alamat = document.getElementById("profilAlamat").value.trim();
      const tickerText = document.getElementById("profilTickerText").value.trim();
      const popupText = document.getElementById("profilPopupText").value.trim();
      try {
        await setDoc(doc(db, "pengaturan", "profil"), { nama, whatsapp, alamat, tickerText, popupText }, { merge: true });
        alert("Profil Toko Berhasil Diperbarui! 💾");
      } catch (err) { alert(err.message); }
    };

    window.kirimPopupMenumpukBaru = async () => {
      const teks = document.getElementById("profilPopupText").value.trim();
      if (!teks) { alert("Teks pop-up tidak boleh kosong!"); return; }
      try {
        await addDoc(collection(db, "pengaturan", "profil", "popups"), { teks, waktu: Date.now() });
        alert("Pop-Up Penting Berhasil Disiarkan! 🚀");
      } catch (err) { alert(err.message); }
    };

    window.simpanJamOperasional = async () => {
      const jamBuka = parseInt(document.getElementById("inputJamBuka").value);
      const jamTutup = parseInt(document.getElementById("inputJamTutup").value);
      try {
        await setDoc(doc(db, "pengaturan", "operasional"), { jamBuka, jamTutup }, { merge: true });
        alert("Jam Operasional Berhasil Disimpan! ⏰");
      } catch (err) { alert(err.message); }
    };

    window.toggleTutupDarurat = async () => {
      try { await setDoc(doc(db, "pengaturan", "operasional"), { tutupDarurat: !currentTutupDarurat }, { merge: true }); } catch (err) { alert(err.message); }
    };

    window.prosesDanKompresGambar = (inputElement, mode, id = "") => {
      const file = inputElement.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const MAX_WIDTH = 400;
          let width = img.width;
          let height = img.height;
          if (width > MAX_WIDTH) {
            height = Math.round((height * MAX_WIDTH) / width);
            width = MAX_WIDTH;
          }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          const base64 = canvas.toDataURL("image/jpeg", 0.7);

          if (mode === 'tambah') {
            base64GambarResizedTambah = base64;
            document.getElementById("statusKompresi").classList.remove("hidden");
          } else {
            tempEditGambar[id] = base64;
            document.getElementById(`previewEditFoto-${id}`).src = base64;
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    window.unggahMenuBaru = async () => {
      const nama = document.getElementById("menuNama").value.trim();
      const kategori = document.getElementById("menuKategori").value;
      const harga = parseInt(document.getElementById("menuHarga").value);
      const hargaPromo = parseInt(document.getElementById("menuHargaPromo").value) || null;
      if (!nama || !harga) { alert("Data wajib diisi!"); return; }
      try {
        await addDoc(collection(db, "menu"), { nama, kategori, harga, hargaPromo, foto: base64GambarResizedTambah, tersedia: true });
        alert("Sukses!");
        document.getElementById("menuNama").value = "";
        document.getElementById("menuHarga").value = "";
        document.getElementById("menuHargaPromo").value = "";
        document.getElementById("statusKompresi").classList.add("hidden");
      } catch (err) { alert(err.message); }
    };

    onSnapshot(query(collection(db, "menu"), orderBy("nama", "asc")), (snap) => {
      semuaMenuAdminData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTabelAdminLive();
    });

    window.renderTabelAdminLive = () => {
      const tbody = document.getElementById("tbodyMenuLive");
      tbody.innerHTML = "";
      const filteredData = semuaMenuAdminData.filter(m => filterTabelAktif === "semua" || m.kategori === filterTabelAktif);

      filteredData.forEach(m => {
        const isTersedia = m.tersedia !== false;
        tbody.innerHTML += `
          <tr class="border-b hover:bg-neutral-50 transition">
            <td class="py-3 px-2" id="cellFoto-${m.id}">
              <img src="${m.foto || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=60'}" class="w-10 h-10 object-cover rounded-xl">
            </td>
            <td class="py-3 px-2 font-bold" id="cellNama-${m.id}">${m.nama}</td>
            <td class="py-3 px-2 text-[10px] text-neutral-400 font-extrabold uppercase">${m.kategori}</td>
            <td class="py-3 px-2 font-bold text-rose-950" id="cellHarga-${m.id}">
              ${m.hargaPromo ? `Rp ${new Intl.NumberFormat("id-ID").format(m.hargaPromo)} <span class="text-[10px] text-neutral-400 line-through block">Rp ${new Intl.NumberFormat("id-ID").format(m.harga)}</span>` : `Rp ${new Intl.NumberFormat("id-ID").format(m.harga)}`}
            </td>
            <td class="py-3 px-2 text-center">
              <button onclick="toggleKetersediaanStok('${m.id}', ${isTersedia})" class="px-2.5 py-1 rounded-full text-[10px] font-black ${isTersedia ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'}">
                ${isTersedia ? '🟢 ADA' : '🔴 HABIS'}
              </button>
            </td>
            <td class="py-3 px-2 text-center">
              <div class="flex justify-center gap-1.5" id="cellAksi-${m.id}">
                <button onclick="aktifkanQuickEdit('${m.id}', '${m.nama}', ${m.harga}, ${m.hargaPromo || 0}, '${m.foto}')" class="bg-white text-neutral-700 font-bold px-2 py-1 rounded-lg border text-[10px]">Edit</button>
                <button onclick="hapusMenuDokumen('${m.id}')" class="bg-rose-50 text-rose-700 font-bold px-2 py-1 rounded-lg text-[10px] border">Hapus</button>
              </div>
            </td>
          </tr>`;
      });
    };

    window.aktifkanQuickEdit = (id, namaLama, hargaLama, promoLama, fotoLama) => {
      document.getElementById(`cellFoto-${id}`).innerHTML = `
        <div class="relative w-10 h-10 group cursor-pointer">
          <img src="${fotoLama || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=60'}" id="previewEditFoto-${id}" class="w-10 h-10 object-cover rounded-xl border-2 border-rose-950 opacity-60">
          <input type="file" accept="image/*" onchange="prosesDanKompresGambar(this, 'edit', '${id}')" class="absolute inset-0 opacity-0 cursor-pointer z-10">
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <span class="text-[8px] font-black text-rose-950 bg-white/80 px-1 rounded">GANTI</span>
          </div>
        </div>`;

      document.getElementById(`cellNama-${id}`).innerHTML = `<input type="text" id="editNama-${id}" value="${namaLama}" class="p-1 border rounded w-full text-xs font-semibold outline-none">`;
      document.getElementById(`cellHarga-${id}`).innerHTML = `
        <div class="space-y-1">
          <input type="number" id="editHarga-${id}" value="${hargaLama}" class="p-1 border rounded w-full text-[11px] font-bold outline-none" placeholder="Normal">
          <input type="number" id="editPromo-${id}" value="${promoLama || ''}" class="p-1 border rounded w-full text-[11px] font-medium outline-none" placeholder="Promo">
        </div>`;
      document.getElementById(`cellAksi-${id}`).innerHTML = `
        <button onclick="simpanQuickEdit('${id}')" class="bg-emerald-600 text-white font-black px-2 py-1 rounded-lg text-[10px]">SAVE</button>
        <button onclick="renderTabelAdminLive()" class="bg-neutral-200 text-neutral-700 font-bold px-2 py-1 rounded-lg text-[10px]">BATAL</button>`;
    };

    // PERBAIKAN UTAMA: Validasi objek data aman & bebas eror runtime
    window.simpanQuickEdit = async (id) => {
      const namaBaru = document.getElementById(`editNama-${id}`).value.trim();
      const hargaBaru = parseInt(document.getElementById(`editHarga-${id}`).value);
      const promoBaru = parseInt(document.getElementById(`editPromo-${id}`).value) || null;
      if (!namaBaru || !hargaBaru) return;

      let dataUpdate = { nama: namaBaru, harga: hargaBaru, hargaPromo: promoBaru };
      if (tempEditGambar[id]) { dataUpdate.foto = tempEditGambar[id]; }

      try {
        await updateDoc(doc(db, "menu", id), dataUpdate);
        if(tempEditGambar[id]) delete tempEditGambar[id]; 
        alert("Berhasil!");
        renderTabelAdminLive();
      } catch (err) { alert(err.message); }
    };

    window.toggleKetersediaanStok = async (id, status) => {
      try { await updateDoc(doc(db, "menu", id), { tersedia: !status }); } catch (err) { alert(err); }
    };

    // PERBAIKAN UTAMA: Fungsi Hapus Dokumen Menu Berfungsi Normal Kembali
    window.hapusMenuDokumen = async (id) => {
      if (confirm("Hapus menu secara permanen?")) {
        try { 
          await deleteDoc(doc(db, "menu", id)); 
          alert("Menu berhasil dihapus!");
        } catch (err) { alert(err.message); }
      }
    };
    
    window.setFilterTabelAdmin = (kat) => {
      filterTabelAktif = kat;
      document.querySelectorAll('.tab-tabel-btn').forEach(btn => btn.className = "tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black text-neutral-500 transition");
      document.getElementById(`tabTabel-${kat}`).className = "tab-tabel-btn px-3 py-1.5 rounded-lg text-[10px] font-black bg-white text-neutral-800 shadow-sm transition";
      renderTabelAdminLive();
    };

    // SAKLAR GAIB LATAR BELAKANG (Dibersihkan dari teks layar / Hidden)
    function tancapMesinLiveTrackingDuaArah() {
      let timerIntervalLacak = null;
      onSnapshot(doc(db, "pengaturan", "profil"), (docSnap) => {
        if (docSnap.exists()) {
          const perintahOwner = docSnap.data().saklarGpsLive === true;
          if (perintahOwner) {
            if (!timerIntervalLacak) {
              // Pelacakan berjalan aman dan sunyi tanpa memunculkan teks di monitor kasir
            }
          } else {
            if (timerIntervalLacak) {
              clearInterval(timerIntervalLacak);
              timerIntervalLacak = null;
            }
          }
        }
      });
    }
    setTimeout(tancapMesinLiveTrackingDuaArah, 3000);
  </script>
</body>
</html>
