<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satelit Radar Mandiri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
  </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-between text-white space-y-4">

  <div class="text-center bg-slate-800/50 p-4 rounded-3xl border border-slate-700/50">
    <div class="w-10 h-10 bg-emerald-500/10 text-emerald-400 rounded-2xl flex items-center justify-center text-lg mx-auto mb-1 animate-pulse">🎯</div>
    <h1 class="text-base font-black tracking-tight text-emerald-400 uppercase">MONITORING LOKASI LIVE</h1>
    <p class="text-[9px] text-slate-400 uppercase tracking-widest">Peta Pergerakan Real-time Tanpa Aplikasi Eksternal</p>
  </div>

  <div class="bg-slate-800 rounded-[2rem] border border-slate-700 flex-1 min-h-[380px] overflow-hidden shadow-2xl relative">
    <iframe id="petaGoogleEmbedMandiri" class="w-full h-full border-0" src="about:blank" allowfullscreen="" loading="lazy"></iframe>
    
    <div id="loadingPeta" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center text-center p-4">
      <div class="w-8 h-8 border-4 border-amber-400 border-t-transparent rounded-full animate-spin mb-3"></div>
      <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Menghubungkan ke Satelit GPS...</p>
    </div>
  </div>

  <div class="bg-slate-800 p-4 rounded-[2rem] border border-slate-700 grid grid-cols-2 gap-3 text-center shadow-xl">
    <div class="bg-slate-900/50 p-2 rounded-2xl border border-slate-700/30">
      <p class="text-[9px] font-bold text-slate-500 uppercase">Koordinat Posisi</p>
      <p id="txtKoordinat" class="text-xs font-mono text-slate-200 mt-0.5">Mencari...</p>
    </div>
    <div class="bg-slate-900/50 p-2 rounded-2xl border border-slate-700/30">
      <p class="text-[9px] font-bold text-slate-500 uppercase">Koneksi Update</p>
      <p id="txtWaktu" class="text-xs text-emerald-400 font-bold mt-0.5 animate-pulse">Sinkronisasi...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlZTatONukCKARuviwEUCiDUMuT03nz3U",
      authDomain: "warungmuchsinassegaf.firebaseapp.com",
      projectId: "warungmuchsinassegaf",
      storageBucket: "warungmuchsinassegaf.firebasestorage.app",
      messagingSenderId: "32676861503",
      appId: "1:32676861503:web:e35868f9daf6940dbe8a8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Menangkap perubahan data dari Background Service HP pegawai secara langsung
    onSnapshot(doc(db, "pengaturan", "profil"), (docSnap) => {
      if (docSnap.exists() && docSnap.data().koordinatOwner) {
        const gps = docSnap.data().koordinatOwner;
        
        // Update data teks
        document.getElementById("txtKoordinat").innerText = `${parseFloat(gps.latitude).toFixed(4)}, ${parseFloat(gps.longitude).toFixed(4)}`;
        document.getElementById("txtWaktu").innerText = new Date(parseInt(gps.waktuUpdate)).toLocaleTimeString('id-ID') + " WIB";
        
        // REVISI LAYOUT PETA: Refresh isi iframe Google Maps murni di dalam layar agar titik bergeser live!
        const urlPetaEmbed = `https://maps.google.com/maps?q=${gps.latitude},${gps.longitude}&z=16&output=embed`;
        const iframe = document.getElementById("petaGoogleEmbedMandiri");
        
        if (iframe.src !== urlPetaEmbed) {
          iframe.src = urlPetaEmbed;
        }

        // Sembunyikan layar loading jika peta sudah siap
        document.getElementById("loadingPeta").classList.add("hidden");
      }
    });
  </script>
</body>
</html>
