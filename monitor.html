<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satelit Radar Mandiri Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
  </style>
</head>
<body class="h-screen w-full flex flex-col justify-between text-white p-3 overflow-hidden box-border">

  <div class="text-center bg-slate-800/60 p-3 rounded-2xl border border-slate-700/50 flex-shrink-0">
    <div class="flex items-center justify-center gap-2">
      <span id="lampuIndikator" class="w-2 h-2 rounded-full bg-red-500"></span>
      <h1 class="text-xs font-black tracking-widest text-emerald-400 uppercase">SATELIT KONTROL OWNER</h1>
    </div>
  </div>

  <div class="bg-slate-800 rounded-3xl border border-slate-700 flex-1 w-full my-3 overflow-hidden shadow-2xl relative">
    <iframe id="petaGoogleEmbedMandiri" class="w-full h-full border-0 block" src="about:blank" allowfullscreen="" loading="lazy"></iframe>
    
    <div id="petaBloking" class="absolute inset-0 bg-slate-950/90 flex flex-col items-center justify-center text-center p-4">
      <div class="text-3xl mb-2">💤</div>
      <p class="text-xs font-black text-slate-400 uppercase tracking-widest">RADAR NON-AKTIF (OFF)</p>
      <p class="text-[10px] text-slate-500 mt-1">Pemancar GPS di HP pegawai dimatikan dari jauh</p>
    </div>
  </div>

  <div class="bg-slate-800 p-3 rounded-2xl border border-slate-700 space-y-3 shadow-xl flex-shrink-0">
    <div class="grid grid-cols-2 gap-3 text-center">
      <div class="bg-slate-900/50 p-2 rounded-xl border border-slate-700/30">
        <p class="text-[8px] font-bold text-slate-500 uppercase tracking-wider">Koordinat</p>
        <p id="txtKoordinat" class="text-xs font-mono text-slate-200 font-bold mt-0.5">Offline</p>
      </div>
      <div class="bg-slate-900/50 p-2 rounded-xl border border-slate-700/30">
        <p class="text-[8px] font-bold text-slate-500 uppercase tracking-wider">Terakhir Update</p>
        <p id="txtWaktu" class="text-xs text-slate-400 font-bold mt-0.5">-</p>
      </div>
    </div>

    <button id="btnSaklarMaster" onclick="toggleSaklarGpsJarakJauh()" class="w-full text-slate-950 bg-amber-400 hover:bg-amber-500 font-black py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-md transition duration-200 active:scale-95">
      📡 NYALAKAN PELACAKAN (ON)
    </button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlZTatONukCKARuviwEUCiDUMuT03nz3U",
      authDomain: "warungmuchsinassegaf.firebaseapp.com",
      projectId: "warungmuchsinassegaf",
      storageBucket: "warungmuchsinassegaf.firebasestorage.app",
      messagingSenderId: "32676861503",
      appId: "1:32676861503:web:e35868f9daf6940dbe8a8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let statusSaklarGpsLive = false;
    let latLama = 0, lngLama = 0;

    // Mendengarkan perubahan data saklar & koordinat secara realtime
    onSnapshot(doc(db, "pengaturan", "profil"), (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        statusSaklarGpsLive = data.saklarGpsLive === true;

        const btn = document.getElementById("btnSaklarMaster");
        const bloking = document.getElementById("petaBloking");
        const lampu = document.getElementById("lampuIndikator");

        if (statusSaklarGpsLive) {
          // TAMPILAN JIKA RADAR ON
          btn.className = "w-full bg-red-600 hover:bg-red-700 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-md transition duration-200";
          btn.innerText = "🛑 MATIKAN PELACAKAN (OFF)";
          bloking.classList.add("hidden");
          lampu.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";

          if (data.koordinatOwner) {
            const gps = data.koordinatOwner;
            const latBaru = parseFloat(gps.latitude);
            const lngBaru = parseFloat(gps.longitude);

            document.getElementById("txtKoordinat").innerText = `${latBaru.toFixed(4)}, ${lngBaru.toFixed(4)}`;
            document.getElementById("txtWaktu").innerText = new Date(parseInt(gps.waktuUpdate)).toLocaleTimeString('id-ID') + " WIB";

            if (latBaru !== latLama || lngBaru !== lngLama) {
              latLama = latBaru; lngLama = lngBaru;
              document.getElementById("petaGoogleEmbedMandiri").src = `https://maps.google.com/maps?q=${latBaru},${lngBaru}&z=16&output=embed`;
            }
          }
        } else {
          // TAMPILAN JIKA RADAR OFF
          btn.className = "w-full bg-amber-400 hover:bg-amber-500 text-slate-950 font-black py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-md transition duration-200";
          btn.innerText = "📡 NYALAKAN PELACAKAN (ON)";
          bloking.classList.remove("hidden");
          lampu.className = "w-2 h-2 rounded-full bg-red-500";
          document.getElementById("petaGoogleEmbedMandiri").src = "about:blank";
          document.getElementById("txtKoordinat").innerText = "Offline";
          document.getElementById("txtWaktu").innerText = "Radar Mati";
        }
      }
    });

    // Fungsi mengubah status saklar ke Firebase
    window.toggleSaklarGpsJarakJauh = async () => {
      try {
        await setDoc(doc(db, "pengaturan", "profil"), {
          saklarGpsLive: !statusSaklarGpsLive
        }, { merge: true });
      } catch (err) { console.error("Gagal mengubah saklar: " + err.message); }
    };
  </script>
</body>
</html>
