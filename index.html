<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Digital Restoran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf9f6; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="pb-32">

  <div id="modalPengumuman" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 hidden transition-opacity duration-300 opacity-0">
    <div class="bg-white rounded-[2.5rem] max-w-md w-full p-6 shadow-2xl border border-neutral-100 relative transform scale-95 transition-transform duration-300">
      <button onclick="tutupModalPengumuman()" class="absolute top-4 right-4 w-8 h-8 bg-neutral-100 text-neutral-500 rounded-full flex items-center justify-center font-bold hover:bg-neutral-200 transition">✕</button>
      <div class="text-center space-y-4">
        <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-xl font-bold mx-auto">📢</div>
        <h3 class="text-base font-black text-neutral-800 uppercase tracking-tight">Informasi Penting</h3>
        <p id="txtPopupPengumuman" class="text-base text-neutral-600 leading-relaxed font-medium">Memuat pengumuman restoran...</p>
        <button onclick="tutupModalPengumuman()" class="w-full bg-rose-950 text-amber-400 font-black py-2.5 rounded-xl text-xs uppercase tracking-wider shadow-md hover:bg-rose-900 transition">Selesai Membaca</button>
      </div>
    </div>
  </div>

  <div id="plangStatusToko" class="fixed top-4 left-1/2 -translate-x-1/2 inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest uppercase shadow-md transition-all duration-300 bg-neutral-600 text-white z-50 border border-white/20">
    <span class="w-2 h-2 rounded-full animate-pulse bg-white"></span>
    <span id="txtPlangStatus">MEMUAT STATUS...</span>
  </div>

  <div class="bg-rose-950 text-white pt-16 pb-10 px-4 rounded-b-[2.5rem] shadow-lg text-center relative overflow-hidden w-full">
    <div class="max-w-6xl mx-auto relative z-10 flex flex-col items-center">
      <h1 id="txtNamaRestoran" class="text-3xl font-black text-amber-400 tracking-tight uppercase">MEMUAT NAMA RESTORAN...</h1>
      <p id="txtInfoOperasional" class="text-xs text-rose-200 mt-1 font-medium">Memuat info jam operasional...</p>
    </div>
  </div>

  <div id="wrapperTicker" class="w-full bg-amber-400 text-rose-950 py-2.5 border-b border-amber-500 font-extrabold text-sm uppercase tracking-wider overflow-hidden hidden">
    <div class="whitespace-nowrap inline-block animate-[marquee_25s_linear_infinite] pl-[100%]">
      <span id="txtTickerPengumuman">Selamat Datang di Toko Kami!</span>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-4 mt-6 space-y-6">
    
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 items-center">
      <input type="text" id="pencarianMenu" oninput="filterDanTampilkanMenu()" placeholder="Cari menu, minuman segar..." class="sm:col-span-1 w-full p-3 bg-white shadow-sm border border-neutral-100 rounded-2xl text-xs font-semibold outline-none focus:border-rose-950 transition">
      <div class="sm:col-span-2 flex gap-1.5 overflow-x-auto no-scrollbar py-1">
        <button onclick="setKategoriAktif('semua')" id="cat-semua" class="cat-btn px-4 py-2 bg-rose-950 text-amber-400 text-xs font-bold rounded-xl shadow-sm transition flex-shrink-0">✨ Semua Menu</button>
        <button onclick="setKategoriAktif('makanan')" id="cat-makanan" class="cat-btn px-4 py-2 bg-white text-neutral-600 border border-neutral-100 text-xs font-bold rounded-xl shadow-sm transition flex-shrink-0">🍲 Makanan</button>
        <button onclick="setKategoriAktif('minuman')" id="cat-minuman" class="cat-btn px-4 py-2 bg-white text-neutral-600 border border-neutral-100 text-xs font-bold rounded-xl shadow-sm transition flex-shrink-0">🍹 Minuman</button>
        <button onclick="setKategoriAktif('cemilan')" id="cat-cemilan" class="cat-btn px-4 py-2 bg-white text-neutral-600 border border-neutral-100 text-xs font-bold rounded-xl shadow-sm transition flex-shrink-0">🍿 Cemilan</button>
      </div>
    </div>

    <div id="containerMenuUtama" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      </div>
  </div>

  <div id="flyingCart" class="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white p-5 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.12)] border-t border-neutral-100 z-50 transform translate-y-full transition-transform duration-300 max-h-[85vh] overflow-y-auto">
    <div id="cartStage1" class="flex justify-between items-center gap-3">
      <div class="flex items-center gap-3">
        <button onclick="kosongkanKeranjangBelanja()" class="px-3 py-3 bg-red-50 text-red-600 font-bold rounded-xl text-xs hover:bg-red-100 transition shadow-sm">🗑️ Bersihkan</button>
        <div>
          <p class="text-[10px] font-bold text-neutral-400 uppercase">Total Pesanan</p>
          <p id="txtTotalHarga" class="text-lg font-black text-rose-950">Rp 0</p>
        </div>
      </div>
      <button onclick="bukaTahapDua()" id="btnMainCartAction" class="bg-rose-950 text-amber-400 font-black px-6 py-3 rounded-xl text-xs uppercase tracking-wider shadow-md hover:bg-rose-900 transition">Lanjut ke Pengiriman ➡️</button>
    </div>

    <div id="cartStage2" class="hidden space-y-4">
      <div class="flex justify-between items-center border-b pb-2">
        <h3 class="text-xs font-black text-neutral-800 uppercase tracking-wider">📋 Validasi & Alamat Kirim</h3>
        <button onclick="kembaliKeTahapSatu()" class="text-[10px] font-bold text-rose-800">⬅️ Kembali</button>
      </div>
      <div id="wrapperRingkasanNota" class="space-y-3 bg-neutral-50 p-3 rounded-2xl border text-xs max-h-[200px] overflow-y-auto"></div>
      <div class="space-y-2.5">
        <input type="text" id="pembeliNama" placeholder="Nama Lengkap Anda" class="w-full p-2.5 bg-neutral-50 border rounded-xl text-xs font-semibold outline-none focus:border-rose-950">
        <textarea id="pembeliAlamat" placeholder="Alamat Rumah Lengkap / Patokan Lokasi" class="w-full p-2.5 bg-neutral-50 border rounded-xl text-xs font-semibold outline-none focus:border-rose-950" rows="2"></textarea>
        <div class="flex items-center gap-2 px-1 py-0.5">
          <input type="checkbox" id="checkSimpanAlamat" class="w-4 h-4 accent-rose-950 rounded cursor-pointer">
          <label for="checkSimpanAlamat" class="text-[11px] text-neutral-500 font-semibold cursor-pointer select-none">Simpan identitas saya untuk pesanan berikutnya</label>
        </div>
      </div>
      <button onclick="kirimOrderKeWhatsApp()" id="btnKirimWA" class="w-full bg-emerald-600 text-white font-black py-3 rounded-xl text-xs uppercase tracking-wider shadow-md hover:bg-emerald-700 transition">Kirim Pesanan ke WA 🚀</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlZTatONukCKARuviwEUCiDUMuT03nz3U",
      authDomain: "warungmuchsinassegaf.firebaseapp.com",
      projectId: "warungmuchsinassegaf",
      storageBucket: "warungmuchsinassegaf.firebasestorage.app",
      messagingSenderId: "32676861503",
      appId: "1:32676861503:web:e35868f9daf6940dbe8a8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let semuaMenuData = [];
    let kategoriAktif = "semua";
    let keranjangBelanja = {};
    
    let jamBukaDb = 10;
    let jamTutupDb = 21;
    let statusTutupDarurat = false;

    let namaRestoranLive = "WARUNG MUCHSIN ASSEGAF";
    let nomorWaLive = "628567770135";

    document.addEventListener("DOMContentLoaded", () => {
      const savedNama = localStorage.getItem("restoran_pembeli_nama");
      const savedAlamat = localStorage.getItem("restoran_pembeli_alamat");
      if(savedNama) document.getElementById("pembeliNama").value = savedNama;
      if(savedAlamat) document.getElementById("pembeliAlamat").value = savedAlamat;
      if(savedNama || savedAlamat) document.getElementById("checkSimpanAlamat").checked = true;
    });

    onSnapshot(doc(db, "pengaturan", "profil"), (docSnap) => {
      if(docSnap.exists()) {
        const data = docSnap.data();
        namaRestoranLive = data.nama || "WARUNG MUCHSIN ASSEGAF";
        nomorWaLive = data.whatsapp || "628567770135";
        
        document.title = `${namaRestoranLive} - Menu Digital`;
        document.getElementById("txtNamaRestoran").innerText = namaRestoranLive;

        if (data.tickerText && data.tickerText.trim() !== "") {
          document.getElementById("txtTickerPengumuman").innerText = data.tickerText;
          document.getElementById("wrapperTicker").classList.remove("hidden");
        } else {
          document.getElementById("wrapperTicker").classList.add("hidden");
        }

        if (data.popupText && data.popupText.trim() !== "") {
          const lastSeenPopup = sessionStorage.getItem("terakhir_baca_popup");
          if (lastSeenPopup !== data.popupText) {
            bukaModalPengumuman(data.popupText);
          }
        } else {
          document.getElementById("modalPengumuman").classList.add("hidden");
        }
      }
    });

    function bukaModalPengumuman(teks) {
      document.getElementById("txtPopupPengumuman").innerText = teks;
      const modal = document.getElementById("modalPengumuman");
      modal.classList.remove("hidden");
      setTimeout(() => {
        modal.classList.remove("opacity-0");
        modal.querySelector("div").classList.remove("scale-95");
      }, 50);
    }

    window.tutupModalPengumuman = () => {
      const modal = document.getElementById("modalPengumuman");
      modal.classList.add("opacity-0");
      modal.querySelector("div").classList.add("scale-95");
      setTimeout(() => {
        modal.classList.add("hidden");
        sessionStorage.setItem("terakhir_baca_popup", document.getElementById("txtPopupPengumuman").innerText);
      }, 300);
    };

    onSnapshot(doc(db, "pengaturan", "operasional"), (docSnap) => {
      if(docSnap.exists()) {
        const data = docSnap.data();
        jamBukaDb = data.jamBuka ?? 10;
        jamTutupDb = data.jamTutup ?? 21;
        statusTutupDarurat = data.tutupDarurat === true;
      }
      document.getElementById("txtInfoOperasional").innerText = `Buka Jam ${jamBukaDb}:00 - ${jamTutupDb}:00 WIB • Pengiriman Cepat & Higienis`;
      cekStatusWarungRealtime();
    });

    function cekStatusWarungRealtime() {
      const sekarang = new Date();
      const jamWIB = (sekarang.getUTCHours() + 7) % 24;
      const diDalamJamKerja = jamWIB >= jamBukaDb && jamWIB < jamTutupDb;
      
      const plang = document.getElementById("plangStatusToko");
      const txtPlang = document.getElementById("txtPlangStatus");
      const btnStage1 = document.getElementById('btnMainCartAction');
      const btnStage2 = document.getElementById('btnKirimWA');
      const isBenarTutup = statusTutupDarurat || !diDalamJamKerja;

      if (isBenarTutup) {
        plang.className = "fixed top-4 left-1/2 -translate-x-1/2 inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest uppercase shadow-md transition-all duration-300 bg-red-600 text-white border border-red-500 animate-pulse z-50";
        txtPlang.innerText = statusTutupDarurat ? "🚨 TUTUP DARURAT" : "🚫 WARUNG TUTUP";
        btnStage1.disabled = true;
        btnStage1.className = "bg-red-700 text-white font-black px-4 py-3 rounded-xl text-[10px] uppercase cursor-not-allowed w-full text-center shadow-none";
        btnStage1.innerText = `🚨 MAAF, WARUNG SEDANG TUTUP`;
        btnStage2.disabled = true;
        btnStage2.className = "w-full bg-red-700 text-neutral-200 font-black py-3 rounded-xl text-[10px] uppercase cursor-not-allowed text-center shadow-none";
        btnStage2.innerText = "🚨 GAGAL: WARUNG SUDAH TUTUP";
        return false;
      } else {
        plang.className = "fixed top-4 left-1/2 -translate-x-1/2 inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest uppercase shadow-md transition-all duration-300 bg-emerald-500 text-rose-950 border border-emerald-400 z-50";
        txtPlang.innerText = "🟢 WARUNG BUKA";
        btnStage1.disabled = false;
        btnStage1.className = "bg-rose-950 text-amber-400 font-black px-6 py-3 rounded-xl text-xs uppercase tracking-wider shadow-md hover:bg-rose-900 transition";
        btnStage1.innerText = `Lanjut ke Pengiriman ➡️`;
        btnStage2.disabled = false;
        btnStage2.className = "w-full bg-emerald-600 text-white font-black py-3 rounded-xl text-xs uppercase tracking-wider shadow-md hover:bg-emerald-700 transition";
        btnStage2.innerText = "Kirim Pesanan ke WA 🚀";
        return true;
      }
    }

    onSnapshot(query(collection(db, "menu"), orderBy("nama", "asc")), (snap) => {
      semuaMenuData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      filterDanTampilkanMenu();
    });

    window.setKategoriAktif = (kat) => {
      kategoriAktif = kat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.className = "cat-btn px-4 py-2 bg-white text-neutral-600 border border-neutral-100 text-xs font-bold rounded-xl shadow-sm transition flex-shrink-0";
      });
      document.getElementById(`cat-${kat}`).className = "cat-btn px-4 py-2 bg-rose-950 text-amber-400 text-xs font-bold rounded-xl shadow-sm transition flex-shrink-0";
      filterDanTampilkanMenu();
    };

    window.filterDanTampilkanMenu = () => {
      const kataKunci = document.getElementById("pencarianMenu").value.toLowerCase();
      const container = document.getElementById("containerMenuUtama");
      container.innerHTML = "";

      const filtered = semuaMenuData.filter(m => {
        const matchKat = kategoriAktif === "semua" || m.kategori === kategoriAktif;
        const matchKata = m.nama.toLowerCase().includes(kataKunci);
        return matchKat && matchKata;
      });

      if(filtered.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-12 text-xs text-neutral-400 font-medium">Menu yang Anda cari tidak ditemukan... 😢</div>`;
        return;
      }

      filtered.forEach(m => {
        const qty = keranjangBelanja[m.id] ? keranjangBelanja[m.id].qty : 0;
        const hargaTampil = m.hargaPromo ? m.hargaPromo : m.harga;
        const formatHarga = new Intl.NumberFormat("id-ID").format(hargaTampil);
        const formatHargaNormal = m.hargaPromo ? new Intl.NumberFormat("id-ID").format(m.harga) : null;
        const isTersedia = m.tersedia !== false;

        const backgroundStyle = qty > 0 
          ? "bg-amber-50/70 border-amber-300 transition-all duration-300 shadow-md ring-1 ring-amber-300/30" 
          : "bg-white border-neutral-100 transition-all duration-300";

        container.innerHTML += `
          <div class="p-4 rounded-[2rem] flex items-center gap-4 border relative overflow-hidden ${backgroundStyle} ${!isTersedia ? 'opacity-50 grayscale' : ''}">
            ${!isTersedia ? '<div class="absolute inset-0 bg-black/5 z-20 flex items-center justify-center font-black text-rose-950 text-xs tracking-widest uppercase">--- STOK HABIS ---</div>' : ''}
            <img src="${m.foto || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150'}" class="w-20 h-20 object-cover rounded-[1.5rem] bg-neutral-50 flex-shrink-0">
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-neutral-800 text-xs capitalize truncate">${m.nama}</h3>
              <p class="text-xs font-black text-rose-950 mt-1">
                Rp ${formatHarga} 
                ${formatHargaNormal ? `<span class="text-[9px] text-neutral-400 line-through font-normal ml-1">Rp ${formatHargaNormal}</span>` : ''}
              </p>
              <div class="flex items-center gap-2.5 mt-3 relative z-30">
                <button ${!isTersedia ? 'disabled' : ''} onclick="ubahJumlahBelanja('${m.id}', -1)" class="w-8 h-8 bg-neutral-100 rounded-xl text-neutral-700 font-bold text-sm flex items-center justify-center hover:bg-neutral-200 active:scale-95 transition disabled:opacity-30">-</button>
                <span class="text-xs font-bold text-neutral-700 w-4 text-center">${qty}</span>
                <button ${!isTersedia ? 'disabled' : ''} onclick="ubahJumlahBelanja('${m.id}', 1)" class="w-8 h-8 bg-rose-950 text-amber-400 rounded-xl font-bold text-sm flex items-center justify-center hover:bg-rose-900 active:scale-95 transition disabled:opacity-30">+</button>
              </div>
            </div>
          </div>`;
      });
      hitungRingkasanBelanja();
    };

    window.ubahJumlahBelanja = (id, delta) => {
      const currentQty = keranjangBelanja[id] ? keranjangBelanja[id].qty : 0;
      const hasilQty = currentQty + delta;
      
      if (hasilQty <= 0) { 
        delete keranjangBelanja[id]; 
      } else { 
        if (!keranjangBelanja[id]) {
          keranjangBelanja[id] = { qty: hasilQty, pedas: "Level 0 (Tidak Pedas)", catatan: "" };
        } else {
          keranjangBelanja[id].qty = hasilQty;
        }
      }
      filterDanTampilkanMenu();
      if (!document.getElementById("cartStage2").classList.contains("hidden")) {
        susunTampilanNotaTahapDua();
      }
    };

    window.kosongkanKeranjangBelanja = () => {
      if (Object.keys(keranjangBelanja).length === 0) return;
      if (confirm("Apakah Anda yakin ingin menghapus semua menu dari keranjang?")) {
        keranjangBelanja = {};
        filterDanTampilkanMenu();
      }
    };

    function hitungRingkasanBelanja() {
      let total = 0;
      let totalItem = 0;
      semuaMenuData.forEach(m => {
        if(keranjangBelanja[m.id]) {
          const hargaFinal = m.hargaPromo ? m.hargaPromo : m.harga;
          total += (hargaFinal * keranjangBelanja[m.id].qty);
          totalItem += keranjangBelanja[m.id].qty;
        }
      });

      const flying = document.getElementById("flyingCart");
      const txtTotal = document.getElementById("txtTotalHarga");

      if (totalItem > 0) {
        txtTotal.innerText = `Rp ${new Intl.NumberFormat("id-ID").format(total)}`;
        flying.classList.remove("translate-y-full");
        cekStatusWarungRealtime();
      } else {
        flying.classList.add("translate-y-full");
        kembaliKeTahapSatu();
      }
    }

    function susunTampilanNotaTahapDua() {
      const wrapper = document.getElementById("wrapperRingkasanNota");
      wrapper.innerHTML = `<h4 class="font-extrabold text-neutral-700 border-b pb-1 mb-2 uppercase text-[10px] tracking-wider">Detail Item & Catatan Rasa</h4>`;
      let grandTotal = 0;

      semuaMenuData.forEach(m => {
        if (keranjangBelanja[m.id]) {
          const itemCart = keranjangBelanja[m.id];
          const hargaFinal = m.hargaPromo ? m.hargaPromo : m.harga;
          const subTotal = hargaFinal * itemCart.qty;
          grandTotal += subTotal;
          const IsMakanan = m.kategori === "makanan" || m.nama.toLowerCase().includes("seblak") || m.nama.toLowerCase().includes("mie");

          wrapper.innerHTML += `
            <div class="bg-white p-3 rounded-xl border border-neutral-100 shadow-sm space-y-2">
              <div class="flex justify-between items-start">
                <div>
                  <span class="font-bold text-neutral-800">${m.nama}</span>
                  <span class="text-[10px] text-neutral-400 font-medium ml-1">(${itemCart.qty}x)</span>
                </div>
                <span class="font-bold text-rose-950">Rp ${new Intl.NumberFormat("id-ID").format(subTotal)}</span>
              </div>
              ${IsMakanan ? `
              <div class="grid grid-cols-3 gap-2 items-center pt-1 border-t border-dashed border-neutral-100">
                <label class="text-[10px] font-bold text-neutral-500 uppercase">Pedas:</label>
                <select onchange="updateOpsiItem('${m.id}', 'pedas', this.value)" class="col-span-2 p-1 bg-neutral-50 border rounded-md text-[11px] outline-none font-semibold text-neutral-700">
                  <option value="Level 0 (Tidak Pedas)" ${itemCart.pedas === "Level 0 (Tidak Pedas)" ? "selected" : ""}>🌶️ Level 0 (Original)</option>
                  <option value="Level 1 (Sangat Ringan)" ${itemCart.pedas === "Level 1 (Sangat Ringan)" ? "selected" : ""}>🌶️ Level 1</option>
                  <option value="Level 2 (Sedang)" ${itemCart.pedas === "Level 2 (Sedang)" ? "selected" : ""}>🌶️ Level 2 (Sedang)</option>
                  <option value="Level 3 (Pedas Mantap)" ${itemCart.pedas === "Level 3 (Pedas Mantap)" ? "selected" : ""}>🌶️ Level 3 (Mantap)</option>
                  <option value="Level 4 (Gila)" ${itemCart.pedas === "Level 4 (Gila)" ? "selected" : ""}>🌶️ Level 4 (Gila)</option>
                  <option value="Level 5 (⚠️ Ambyar)" ${itemCart.pedas === "Level 5 (⚠️ Ambyar)" ? "selected" : ""}>🌶️ Level 5 (⚠️ Ambyar)</option>
                </select>
              </div>
              ` : ''}
              <div class="grid grid-cols-3 gap-2 items-center">
                <label class="text-[10px] font-bold text-neutral-500 uppercase">Catatan:</label>
                <input type="text" value="${itemCart.catatan || ''}" oninput="updateOpsiItem('${m.id}', 'catatan', this.value)" placeholder="Contoh: Pisah kuah / tanpa sayur" class="col-span-2 p-1 bg-neutral-50 border rounded-md text-[11px] outline-none font-medium placeholder-neutral-300">
              </div>
            </div>`;
        }
      });

      wrapper.innerHTML += `
        <div class="flex justify-between items-center border-t pt-2 mt-2 font-black text-rose-950 text-xs">
          <span>TOTAL NOTA:</span>
          <span>Rp ${new Intl.NumberFormat("id-ID").format(grandTotal)}</span>
        </div>`;
    }

    window.updateOpsiItem = (id, properti, nilai) => {
      if (keranjangBelanja[id]) keranjangBelanja[id][properti] = nilai;
    };

    window.bukaTahapDua = () => {
      if(!cekStatusWarungRealtime()) return;
      susunTampilanNotaTahapDua();
      document.getElementById("cartStage1").classList.add("hidden");
      document.getElementById("cartStage2").classList.remove("hidden");
    };

    window.kembaliKeTahapSatu = () => {
      document.getElementById("cartStage2").classList.add("hidden");
      document.getElementById("cartStage1").classList.remove("hidden");
    };

    window.kirimOrderKeWhatsApp = () => {
      if(!cekStatusWarungRealtime()) {
        alert("Mohon maaf, warung baru saja tutup. Pesanan Anda tidak dapat diproses.");
        return; 
      }

      const nama = document.getElementById("pembeliNama").value.trim();
      const alamat = document.getElementById("pembeliAlamat").value.trim();
      const simpanIdentitasChecked = document.getElementById("checkSimpanAlamat").checked;

      if(!nama || !alamat) { alert("Biodata pengiriman wajib diisi lengkap!"); return; }

      if (simpanIdentitasChecked) {
        localStorage.setItem("restoran_pembeli_nama", nama);
        localStorage.setItem("restoran_pembeli_alamat", alamat);
      } else {
        localStorage.removeItem("restoran_pembeli_nama");
        localStorage.removeItem("restoran_pembeli_alamat");
      }

      let teksPesanan = `*PESANAN DIGITAL - ${namaRestoranLive}*\n`;
      teksPesanan += `----------------------------------------\n`;
      teksPesanan += `👤 *Nama Pembeli:* ${nama}\n`;
      teksPesanan += `📍 *Alamat Kirim:* ${alamat}\n`;
      teksPesanan += `----------------------------------------\n\n`;
      teksPesanan += `📦 *DAFTAR PESANAN VALIDIATED:*\n`;

      let grandTotal = 0;
      semuaMenuData.forEach(m => {
        if(keranjangBelanja[m.id]) {
          const itemCart = keranjangBelanja[m.id];
          const hargaFinal = m.hargaPromo ? m.hargaPromo : m.harga;
          const subTotal = hargaFinal * itemCart.qty;
          grandTotal += subTotal;
          
          teksPesanan += `- *${m.nama}* (${itemCart.qty}x) = Rp ${new Intl.NumberFormat("id-ID").format(subTotal)}\n`;
          if(m.kategori === "makanan" || m.nama.toLowerCase().includes("seblak") || m.nama.toLowerCase().includes("mie")) {
            teksPesanan += `  🔥 _Pedas: ${itemCart.pedas}_\n`;
          }
          if(itemCart.catatan && itemCart.catatan.trim() !== "") {
            teksPesanan += `  📝 _Notes: "${itemCart.catatan.trim()}"_\n`;
          }
          teksPesanan += `\n`;
        }
      });

      teksPesanan += `\n💰 *TOTAL PEMBAYARAN:* *Rp ${new Intl.NumberFormat("id-ID").format(grandTotal)}*\n`;
      teksPesanan += `----------------------------------------\n`;
      teksPesanan += `_Mohon segera dikonfirmasi dan diproses ya, terima kasih!_`;

      const urlWA = `https://api.whatsapp.com/send?phone=${nomorWaLive}&text=${encodeURIComponent(teksPesanan)}`;
      window.open(urlWA, '_blank');
    };
  </script>

  <style>
    @keyframes marquee {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }
  </style>
</body>
